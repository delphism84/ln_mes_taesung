# ts.dair.co.kr — HTTPS 전용 (80: ACME + HTTPS 리다이렉트만)
# PHP: Docker PHP-FPM 127.0.0.1:19090
# 인증서: /etc/letsencrypt/live/ts.dair.co.kr/

upstream ts_php {
    server 127.0.0.1:19090;
}

server {
    listen 80;
    listen [::]:80;
    server_name ts.dair.co.kr;
    root /lunar/ln_mes/ts/ln_mes_taesung;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location ^~ /config/ {
        deny all;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ts.dair.co.kr;

    root /lunar/ln_mes/ts/ln_mes_taesung;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/ts.dair.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ts.dair.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 64m;

    location ^~ /config/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_param PATH_INFO "";
        fastcgi_index index.php;
        fastcgi_pass ts_php;
        fastcgi_param HTTPS on;
    }
}
