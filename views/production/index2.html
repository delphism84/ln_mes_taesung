<div class="container" style="margin-top:150px;">
<h1>jQuery printObject Plugin Demo</h1>
<table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Firstname</th>
        <th>Lastname</th>
        <th>Email</th>

      </tr>
      <tr>
        <td>July</td>
        <td>Dooley</td>
        <td>july@example.com</td>
      </tr>
    </tbody>
  </table>
  <p><button id="basic" class="btn btn-primary">Print</button> <button id="custom" class="btn btn-success">With Custom Header & Footer</button></p>
  </div>
<script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
<script src="http://its.jerp.co.kr/assets/js/printObject.js"></script>
<script>
$( "#basic" ).click(function() {
  $("table").printObject();
});
$( "#custom" ).click(function() {
  $("table").printObject({    header: "<h2> jQuery Script </h2>",
   header_style: 'color: red;',
   footer: '<a href="ht​tp://example.com"> JQuery Script </a>',
   footer_style: "color: blue; font-size: 14px;"
});
});
</script>
