  <script type="text/javascript">
	function onKeyDownBarcode(Obj){
		if(window.event.keyCode == 13){
			var param = "barcode="+Obj.value;
			$.ajax({ 
				type: 'post'
				, url: './ajax_getbarcode.php'
				, data: param
				, datatype: 'json'
				, success: function(data) {
					var res =  eval('(' + data + ')');
					var bar_id = Obj.getAttribute("id");
					var bar_array = bar_id.split("_");
					var bar_num = parseInt(bar_array[1]);
					var product_id = "product_"+bar_num;
					var bar_next_id = "barcode_"+(bar_num+1);
					if(res.rst == 1){
						$("#"+product_id).val(res.product);
					}else{
						var bar_confirm = confirm("등록되지 않은 품목입니다. 상품을 등록하시겠습니까?");
						if(bar_confirm){
							window.open("/weberp/base/base02/base02_regist.php?submode=barcode&bacode="+Obj.value+"&inputname="+product_id,"window","width=1000,height=500,resizable=yes,scrollbars=yes");
						}else{
							$("#"+product_id).val("등록되지 않은 품목입니다.");
							$("#"+product_id).css("color","#ff0000");
						}
					}
					document.getElementById(bar_next_id).focus();
				}
				, error: function(data, status, err) {
					alert("바코드 조회 에러!");
				}
				, complete: function() {}
			});
		}
	}

	function onFocusBarcode(Obj){
		var bar_id = Obj.getAttribute("id");
		var bar_array = bar_id.split("_");
		var bar_num = parseInt(bar_array[1])+1;
		Obj.setAttribute("onfocus","");
		$("#barcodeTable").append("<tr><td>바코드</td><td><input type=\"text\" id=\"barcode_"+bar_num+"\" name=\"barcode_"+bar_num+"\" onkeydown=\"onKeyDownBarcode(this)\" onfocus=\"onFocusBarcode(this)\" tabindex='"+bar_num+"'></td><td>품목명</td><td><input type=\"text\" id=\"product_"+bar_num+"\" name=\"product_"+bar_num+"\"></td><td>수량</td><td><input type=\"text\" id=\"num_"+bar_num+"\" name=\"num_"+bar_num+"\"></td></tr>");
	}
  </script>
